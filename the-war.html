<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civil War Study App</title>
<style>
  :root{
    --navy:#1e3a5f; --navy2:#2c5282; --gold:#d69e2e;
    --green:#2f855a; --red:#c53030; --paper:#ffffff; --ink:#1a202c;
    --soft:#edf2f7; --line:#e2e8f0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#f7fafc,#e8eef5);color:var(--ink);line-height:1.5}
  .topbar{position:sticky;top:0;z-index:50}
  header{background:var(--navy);color:#fff;padding:16px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.15)}
  header h1{margin:0;font-size:19px;letter-spacing:.3px}
  header p{margin:4px 0 0;font-size:13px;opacity:.85}
  .stats{display:flex;justify-content:center;gap:10px;background:#16304f;padding:8px 10px;border-top:1px solid #294c73}
  .stats .pill{background:rgba(255,255,255,.1);color:#fff;border-radius:99px;padding:5px 13px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
  .stats .pill.gold{background:rgba(214,158,46,.25);color:#ffe08a}

  /* campaign map */
  .card.campaign{background:#1e3a5f;background:linear-gradient(135deg,#1e3a5f,#2c5282);color:#fff;border:none}
  .campaign h3{margin:0 0 4px;color:#fff;font-size:17px}
  .campaign .sub{font-size:13px;opacity:.85;margin:0 0 12px}
  .vbar{position:relative;height:16px;background:#9aa7b5;border-radius:99px;overflow:visible;margin:18px 0 8px}
  .vfill{height:100%;background:linear-gradient(90deg,#3a6ea5,#5b8fc4);border-radius:99px;transition:width .6s}
  .vflag{position:absolute;top:-13px;transform:translateX(-50%);font-size:22px;transition:left .6s;filter:drop-shadow(0 2px 2px rgba(0,0,0,.4))}
  .vlabel{text-align:center;font-weight:700;font-size:15px;margin-bottom:12px}
  .terrgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:7px}
  .terr{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:7px 5px;text-align:center;font-size:11px;opacity:.65;transition:.3s}
  .terr.won{background:rgba(91,143,196,.45);border-color:#7fb0e0;opacity:1;font-weight:700}
  .terr .tflag{font-size:18px;display:block;margin-bottom:2px}
  .victory{margin-top:14px;background:var(--gold);color:#1a202c;border-radius:12px;padding:12px;text-align:center;font-weight:800;font-size:16px}
  .resetlink{display:block;text-align:center;color:#a0aec0;font-size:12px;margin-top:14px;cursor:pointer;text-decoration:underline}

  /* gold toast */
  #toasts{position:fixed;left:0;right:0;bottom:24px;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;z-index:100}
  .toast{background:var(--navy);color:#ffe08a;font-weight:800;padding:10px 18px;border-radius:99px;box-shadow:0 4px 14px rgba(0,0,0,.3);font-size:15px;animation:toastpop .4s ease,toastfade .4s ease 1.6s forwards}
  .toast.terr{background:var(--gold);color:#1a202c}
  @keyframes toastpop{from{opacity:0;transform:translateY(18px) scale(.9)}to{opacity:1;transform:none}}
  @keyframes toastfade{to{opacity:0;transform:translateY(-10px)}}

  .wrap{max-width:760px;margin:0 auto;padding:16px}
  .bar{height:8px;background:var(--soft);border-radius:99px;overflow:hidden;margin:10px 0 4px}
  .bar>div{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#f6c34a);transition:width .4s}
  .barlabel{font-size:12px;color:#4a5568;text-align:center;margin-bottom:6px}

  .btn{display:inline-block;border:none;cursor:pointer;font-size:16px;font-weight:600;border-radius:12px;padding:13px 18px;transition:transform .08s,box-shadow .2s}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--navy2);color:#fff;box-shadow:0 3px 8px rgba(44,82,130,.3)}
  .btn.gold{background:var(--gold);color:#1a202c;box-shadow:0 3px 8px rgba(214,158,46,.35)}
  .btn.ghost{background:#fff;color:var(--navy2);border:2px solid var(--navy2)}
  .btn.block{display:block;width:100%;margin-top:10px;text-align:center}

  .card{background:var(--paper);border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--line)}
  .secttitle{margin:18px 0 6px;color:var(--navy)}

  /* day cards */
  .daycard{cursor:pointer;display:flex;align-items:center;gap:14px}
  .daycard .dnum{flex-shrink:0;width:46px;height:46px;border-radius:12px;background:var(--navy2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;text-align:center;line-height:1.1}
  .daycard .dbody{flex:1}
  .daycard .dbody h3{margin:0;font-size:16px}
  .daycard .dbody .dmeta{font-size:12px;color:#718096}
  .daycard .dbody .bar{margin:8px 0 0}
  .daycard .chev{color:#cbd5e0;font-size:22px}
  .ultimate{background:#fff7e6;border:2px solid var(--gold)}
  .ultimate h3{color:#9c6f0e}

  .topiccard{display:flex;align-items:center;gap:14px;cursor:pointer}
  .topiccard .emoji{font-size:28px;flex-shrink:0}
  .topiccard .t{flex:1}
  .topiccard .t h3{margin:0;font-size:15px}
  .topiccard .t span{font-size:12px;color:#718096}
  .check{font-size:20px;color:var(--green)}
  .check.todo{color:#cbd5e0}

  .summary{font-size:16px}
  .summary h2{color:var(--navy);margin-top:0;font-size:20px}
  .summary ul{padding-left:20px}
  .summary li{margin:6px 0}
  .tag{display:inline-block;background:var(--soft);color:var(--navy2);font-size:11px;font-weight:700;
    padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

  .flash{background:#fffdf5;border:1px solid #f0e3b8;border-radius:14px;padding:14px;margin:12px 0}
  .flash .q{font-weight:600}
  .flash .qlabel{color:var(--gold);font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .ans{margin-top:10px;background:#e9f6ee;border:1px solid #b7e0c6;color:#22543d;border-radius:10px;padding:10px;display:none;font-weight:600}
  .ans.show{display:block;animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .flashin{display:block;width:100%;margin-top:10px;padding:11px 13px;font-size:15px;border:2px solid var(--line);
    border-radius:10px;outline:none;font-family:inherit}
  .flashin:focus{border-color:var(--navy2)}
  .flashin[readonly]{background:#f7fafc;color:#4a5568}
  .reveal{margin-top:10px;background:#fff;border:2px solid var(--gold);color:#9c6f0e;font-weight:700;
    border-radius:10px;padding:9px 14px;cursor:pointer;font-size:14px}

  .navrow{display:flex;gap:10px;margin-top:18px}
  .navrow .btn{flex:1}

  .qcount{font-size:13px;color:#718096;text-align:center;margin-bottom:6px}
  .qtext{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:14px}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:2px solid var(--line);border-radius:12px;
    padding:13px 15px;margin:9px 0;font-size:15px;cursor:pointer;transition:.15s}
  .opt:hover{border-color:var(--navy2)}
  .opt.correct{background:#e9f6ee;border-color:var(--green);color:#22543d;font-weight:700}
  .opt.wrong{background:#fdecec;border-color:var(--red);color:#742a2a}
  .opt.disabled{cursor:default}
  .explain{margin-top:12px;background:var(--soft);border-radius:12px;padding:12px;font-size:14px;display:none}
  .explain.show{display:block}
  .explain b{color:var(--navy)}

  .scorebox{text-align:center;padding:10px}
  .scorebox .big{font-size:54px;font-weight:800;color:var(--navy)}
  .scorebox .msg{font-size:18px;margin:6px 0 16px;font-weight:600}
  .review h4{margin:18px 0 6px;color:var(--navy)}
  .ritem{font-size:14px;padding:10px;border-radius:10px;margin:6px 0;border:1px solid var(--line)}
  .ritem.ok{background:#f0faf4}
  .ritem.no{background:#fdf2f2}
  .ritem .icon{font-weight:800;margin-right:6px}
  footer{text-align:center;font-size:12px;color:#a0aec0;padding:20px}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="topbar">
  <header>
    <h1>⚔️ The Civil War: March to Victory</h1>
    <p>General Vaughn — study day by day to win the war for the Union!</p>
  </header>
  <div id="stats" class="stats"></div>
</div>

<div class="wrap" id="app"></div>
<footer>Civil War study app • A 4-day campaign • For the Union! 🇺🇸</footer>
<div id="toasts"></div>

<script>
/* ===================== CONTENT ===================== */
const DAYS = [
 { n:1, title:"Bull Run, Lincoln & Emancipation", topics:[
   { emoji:"💥", title:"Battle of Bull Run (Manassas)", summary:`<span class="tag">Day 1 · Virginia, 1861</span>
     <p>The <b>first major battle</b> of the Civil War, fought in Virginia in 1861. The <b>Confederates (South) won.</b> Most people had expected a quick, easy war — Bull Run shocked everyone and proved the war would be <b>long and bloody</b>.</p>
     <p>Confederate general Thomas Jackson stood firm "like a stone wall," earning the nickname <b>Stonewall Jackson</b>. (Spy <b>Rose Greenhow</b> had secretly passed the Union's battle plans to the South, helping them win.)</p>`,

   { emoji:"🎩", title:"Lincoln's Views on Slavery", summary:`<span class="tag">Day 1</span>
     <p>Lincoln personally hated slavery, but his stated public goal was always to <b>save the Union</b>. His words changed over time:</p>
     <ul>
       <li><b>1854:</b> if "all men are created equal," then no one has the right to enslave another.</li>

     </ul>`,
     flash:[{q:`In his "House Divided" speech, what did Lincoln say could not last?`,a:`A nation permanently half slave and half free.`},
            {q:`According to his 1862 letter, what was Lincoln's #1 goal in the war?`,a:`To save the Union (above freeing or keeping slavery).`}]},
   { emoji:"📜", title:"The Emancipation Proclamation", summary:`<span class="tag">Day 1 · Jan 1, 1863</span>
     <p><b>What it said:</b> it declared <b>free all enslaved people in the Confederate states "in rebellion"</b> against the U.S., and it let <b>Black men join the Union army</b>.</p>
     <p><b>Why it was clever &amp; important:</b> Lincoln couldn't legally end slavery everywhere, but as commander-in-chief he could <b>seize enemy "property"</b> in wartime — and the South called enslaved people property. He did <b>not</b> free people in the loyal <b>border states</b> (he didn't want them to secede). It turned the war into a fight to <b>end slavery</b>. He waited for the "victory" at <b>Antietam</b> to announce it, and called it his proudest act.</p>`,
     flash:[{q:`Which enslaved people did the Emancipation Proclamation free?`,a:`Those in the Confederate states in rebellion — NOT the loyal border states.`},
            {q:`What new opportunity did it give African American men?`,a:`The chance to join and fight for the Union army.`}]}
 ]},
 { n:2, title:"Women of the War & Antietam", topics:[
   { emoji:"👩", title:"Women in the Civil War (3 Roles)", summary:`<span class="tag">Day 2</span>
     <p>The war changed women's lives in <b>three big ways</b>:</p>
     <ul>
       <li><b>Advanced women's rights:</b> women <b>invented the profession of nursing</b>; suffragists like Susan B. Anthony gathered a 400,000-signature anti-slavery petition.</li>

     flash:[{q:`What profession did women "invent" during the Civil War?`,a:`Nursing.`},
            {q:`Name one way women gained power during the war.`,a:`Spying, running farms/businesses, or protesting (the Richmond bread riot).`}]},
   { emoji:"🎖️", title:"Key Women & Their Contributions", summary:`<span class="tag">Day 2</span>

       <li><b>Clara Barton</b> — the "Angel of the Battlefield," nursed soldiers on <b>both sides</b>; later <b>founded the American Red Cross</b>.</li>

       <li><b>Harriet Tubman</b> — <b>spy and scout</b>; led a raid in South Carolina that <b>freed 750+ enslaved people</b>, many of whom joined the Union army.</li>
       <li><b>Harriet Beecher Stowe</b> — wrote <i>Uncle Tom's Cabin</i>; Lincoln called her "the little woman who made this great war."</li>

     flash:[{q:`What organization did Clara Barton found after the war?`,a:`The American Red Cross.`},
            {q:`How did Harriet Tubman help the Union army?`,a:`As a spy/scout — she led a raid that freed 750+ enslaved people.`}]},
   { emoji:"🩸", title:"Battle of Antietam", summary:`<span class="tag">Day 2 · Maryland, 1862</span>
     <p>The <b>bloodiest single DAY</b> in American history. Technically it was a <b>draw</b>, but the South retreated out of Maryland, so Lincoln <b>called it a Union victory</b>.</p>
     <p>That "victory" gave Lincoln the strong position he needed to issue the <b>Emancipation Proclamation</b>.</p>`,
     flash:[{q:`Why is Antietam remembered (two reasons)?`,a:`It was the bloodiest single day; and the "victory" let Lincoln issue the Emancipation Proclamation.`},
            {q:`Was Antietam really a clear Union win?`,a:`No — it was basically a draw, but Lincoln called it a victory because the South left Maryland.`}]}
 ]},
 { n:3, title:"Vicksburg, Gettysburg & Total War", topics:[
   { emoji:"🌊", title:"Siege of Vicksburg", summary:`<span class="tag">Day 3 · 1863</span>
     <p>General <b>Ulysses S. Grant</b> captured Vicksburg after a long siege, giving the Union complete control of the <b>Mississippi River</b>. This <b>split the Confederacy in two</b> and was a huge turning point in the West.</p>`,
     flash:[{q:`Which Union general won at Vicksburg?`,a:`Ulysses S. Grant.`},
            {q:`Why did controlling Vicksburg matter?`,a:`It gave the Union the Mississippi River and split the Confederacy in two.`}]},
   { emoji:"⚔️", title:"Battle of Gettysburg", summary:`<span class="tag">Day 3 · July 1–3, 1863</span>
     <p>The <b>turning point</b> of the war. Lee invaded the North, but the Union <b>stopped him</b> in the bloodiest battle of the war. The Confederate <b>"Pickett's Charge"</b> failed disastrously — <b>George Pickett</b> lost about <b>half his men</b>. Lee retreated and <b>never invaded the North again</b>.</p>
     <p><i>(Fun fact: Jennie Wade was the only civilian killed at Gettysburg — a stray bullet hit her while she baked bread for Union soldiers.)</i></p>`,
     flash:[{q:`Why is Gettysburg called the turning point of the war?`,a:`The Union stopped Lee's invasion of the North; he never invaded again.`},
            {q:`Who led the failed Confederate charge at Gettysburg?`,a:`George Pickett ("Pickett's Charge").`}]},
   { emoji:"🕊️", title:"The Gettysburg Address", summary:`<span class="tag">Day 3</span>
     <p>A <b>short but famous speech</b> Lincoln gave at the Gettysburg battlefield cemetery. He honored the dead and called for a "new birth of freedom," so that <b>"government of the people, by the people, for the people, shall not perish from the earth."</b></p>
     <p><b>Why it's important:</b> it <b>redefined the war</b> as a fight for <b>equality and democracy</b> — not just to preserve the Union.</p>`,
     flash:[{q:`Finish the line: "government of the people, by the people, ___"`,a:`"…for the people, shall not perish from the earth."`},

   { emoji:"🔥", title:"Sherman's March to the Sea", summary:`<span class="tag">Day 3 · 1864</span>

     flash:[{q:`What strategy did Sherman use on his March to the Sea?`,a:`Total war — destroying everything useful to the enemy.`},

   { emoji:"😡", title:"New York Draft Riots", summary:`<span class="tag">Day 3 · 1863</span>
     <p>When the Union began <b>drafting</b> men into the army, many in <b>New York City</b> rioted. A major cause: <b>rich men could pay $300 to skip the draft</b>, which felt deeply unfair to poor and immigrant workers. The riots turned violent and included terrible attacks on Black residents.</p>`,
     flash:[{q:`What unfair draft rule helped cause the riots?`,a:`Rich men could pay $300 to avoid being drafted.`},
            {q:`In which city were the 1863 draft riots?`,a:`New York City.`}]},
   { emoji:"🏛️", title:"Jefferson Davis", summary:`<span class="tag">Day 3</span>
     <p><b>Jefferson Davis</b> was the <b>president of the Confederacy</b> (the Southern states that left the Union). After the war, he was caught while trying to escape.</p>`,
     flash:[{q:`Who was the president of the Confederacy?`,a:`Jefferson Davis.`},
            {q:`Davis led which side?`,a:`The Confederacy (the South).`}]}
 ]},

 {day:2,id:'d2a',q:`Clara Barton, the "Angel of the Battlefield," later founded:`,o:[`The Salvation Army`,`The American Red Cross`,`The United Way`,`The American Heart Association`],c:1,e:`She nursed soldiers on both sides, then founded the American Red Cross.`},
 {day:2,id:'d2b',q:`Who was the superintendent of Union nurses who chose only "matronly" women over 30?`,o:[`Clara Barton`,`Dorothea Dix`,`Rose Greenhow`,`Harriet Tubman`],c:1,e:`Dorothea Dix set strict rules for who could serve as a nurse.`},
 {day:2,id:'d2c',q:`How did Harriet Tubman help the Union during the war?`,o:[`She wrote war songs`,`She spied and led a raid that freed 750+ enslaved people`,`She was a Confederate nurse`,`She ran for Congress`],c:1,e:`She scouted and spied, and led a South Carolina raid freeing 750+ people — many then joined the army.`},
 {day:2,id:'d2d',q:`The Confederate spy who got the Union's Bull Run plans to the South (hidden in a friend's hair) was:`,o:[`Mary Bowser`,`Dorothea Dix`,`Rose Greenhow`,`Jennie Wade`],c:2,e:`Rose Greenhow's spying helped the South win Bull Run; she later drowned carrying Confederate gold.`},
 {day:2,id:'d2e',q:`Lincoln greeted the author of Uncle Tom's Cabin as "the little woman who made this great war." Who was she?`,o:[`Louisa May Alcott`,`Harriet Beecher Stowe`,`Julia Ward Howe`,`Susan B. Anthony`],c:1,e:`Harriet Beecher Stowe's novel turned many Northerners against slavery.`},
 {day:2,id:'d2f',q:`What profession did women "invent" during the Civil War?`,o:[`teaching`,`nursing`,`law`,`banking`],c:1,e:`Thousands of women became nurses for both the Union and the Confederacy.`},
 {day:2,id:'d2g',q:`The Battle of Antietam (Maryland, 1862) is best known as:`,o:[`the bloodiest single day of the war`,`the first battle of the war`,`a huge Confederate victory`,`the final battle`],c:0,e:`It was the bloodiest single day; a draw Lincoln called a victory because the South retreated.`},
 {day:2,id:'d2h',q:`In 1863, about 5,000 women in Richmond showed the power of the home front by:`,o:[`voting in an election`,`staging a "bread riot"`,`joining the army`,`marching to Washington`],c:1,e:`The Richmond bread riot warned leaders they couldn't ignore hunger at home.`},
 // ---- Day 3 ----
 {day:3,id:'d3a',q:`General Grant's victory at the Siege of Vicksburg (1863) gave the Union control of:`,o:[`the Atlantic coast`,`the Mississippi River`,`the city of Atlanta`,`Washington, D.C.`],c:1,e:`Controlling the Mississippi split the Confederacy in two.`},
 {day:3,id:'d3b',q:`Why is the Battle of Gettysburg considered the turning point of the war?`,o:[`It started the war`,`The Union stopped Lee's invasion of the North`,`The South captured Washington`,`It ended slavery`],c:1,e:`After Gettysburg, Lee retreated and never invaded the North again.`},
 {day:3,id:'d3c',q:`The disastrous Confederate charge at Gettysburg, where about half the men became casualties, was led by:`,o:[`Stonewall Jackson`,`George Pickett`,`Robert E. Lee`,`Ulysses S. Grant`],c:1,e:`"Pickett's Charge" failed badly — roughly half the attackers were killed, wounded, or captured. Pickett was ordered to do it and wept at the losses.`},
 {day:3,id:'d3d',q:`Finish Lincoln's famous line from the Gettysburg Address: "government of the people, by the people, ___"`,o:[`for the people`,`under God`,`forever free`,`and the states`],c:0,e:`"…shall not perish from the earth."`},
 {day:3,id:'d3e',q:`Why is the Gettysburg Address important?`,o:[`It declared war on the South`,`It redefined the war as a fight for equality and democracy`,`It freed the border states`,`It ended the draft`],c:1,e:`In a short speech, Lincoln gave the war a deeper purpose: a "new birth of freedom."`},
 {day:3,id:'d3f',q:`Sherman's "March to the Sea" — destroying everything useful to the enemy — is an example of:`,o:[`guerrilla war`,`total war`,`a siege`,`a naval blockade`],c:1,e:`Sherman aimed to break the South's resources AND its will to fight.`},
 {day:3,id:'d3g',q:`Sherman "made ___ howl" as he marched from Atlanta to Savannah.`,o:[`Virginia`,`Georgia`,`Tennessee`,`South Carolina`],c:1,e:`His march cut a path of destruction across Georgia.`},
 {day:3,id:'d3h',q:`A major cause of the 1863 New York City draft riots was anger that:`,o:[`the South was winning`,`rich men could pay $300 to avoid the draft`,`women couldn't serve`,`there were no weapons`],c:1,e:`Poor and immigrant workers resented the unfair $300 buy-out.`},
 {day:3,id:'d3i',q:`The president of the Confederacy was:`,o:[`Robert E. Lee`,`Jefferson Davis`,`Stonewall Jackson`,`Abraham Lincoln`],c:1,e:`Jefferson Davis led the Confederate states; Lincoln led the Union.`},
 {day:3,id:'d3j',q:`Jennie Wade, the only civilian killed at the Battle of Gettysburg, died when:`,o:[`she was caught spying`,`a stray bullet hit her while she baked bread`,`she fought disguised as a man`,`she drowned`],c:1,e:`A bullet went through her house as she baked bread for Union soldiers.`},
 // ---- Day 4 ----
 {day:4,id:'d4a',q:`The two famous ironclad (iron-armored) warships that fought were the:`,o:[`Monitor and Merrimack`,`Maine and Arizona`,`Constitution and Bonhomme Richard`,`Titanic and Lusitania`],c:0,e:`The Union's Monitor battled the Confederate Merrimack (renamed the Virginia).`},
 {day:4,id:'d4b',q:`Which is an example of how technology changed the Civil War?`,o:[`Knights fought on horseback`,`Railroads and the telegraph moved troops and messages quickly`,`Soldiers used only swords`,`Battles were fought with flashlights`],c:1,e:`Railroads, the telegraph, and rifled muskets all reshaped the war.`},
 {day:4,id:'d4c',q:`The 13th Amendment (1865) did what?`,o:[`Gave women the vote`,`Permanently abolished slavery in the U.S.`,`Ended the draft`,`Created the Red Cross`],c:1,e:`It made the end of slavery permanent and nationwide.`},
 {day:4,id:'d4d',q:`The war effectively ended when Robert E. Lee surrendered to Grant at:`,o:[`Gettysburg`,`Appomattox Court House`,`Fort Sumter`,`Richmond`],c:1,e:`Lee surrendered at Appomattox, Virginia, in April 1865.`},
 {day:4,id:'d4e',q:`Who assassinated President Lincoln at Ford's Theatre?`,o:[`Jefferson Davis`,`John Wilkes Booth`,`George Pickett`,`Robert E. Lee`],c:1,e:`Booth, a Confederate supporter, shot Lincoln days after the war ended.`},
 {day:4,id:'d4f',q:`After shooting Lincoln, John Wilkes Booth:`,o:[`surrendered right away`,`jumped from the box down to the stage`,`fled safely to Canada`,`was never identified`],c:1,e:`He leapt to the stage (injuring his leg), then escaped briefly before being caught.`}
];

/* ===================== STATE / GAME ===================== */
const app = document.getElementById('app');
let read={}, gold=0, earned={};
try{ read=JSON.parse(localStorage.getItem('cw2_read')||'{}'); }catch(e){ read={}; }
try{ gold=parseInt(localStorage.getItem('cw2_gold'))||0; }catch(e){ gold=0; }
try{ earned=JSON.parse(localStorage.getItem('cw2_earned')||'{}'); }catch(e){ earned={}; }
function save(){ try{ localStorage.setItem('cw2_read',JSON.stringify(read)); localStorage.setItem('cw2_gold',gold); localStorage.setItem('cw2_earned',JSON.stringify(earned)); }catch(e){} }

const TERRITORIES=["Fort Sumter","Bull Run","Fort Donelson","Shiloh","Antietam","Vicksburg","Gettysburg","Chattanooga","Atlanta","Savannah","Appomattox"];
const PER=45;
function captured(){ return Math.min(TERRITORIES.length, Math.floor(gold/PER)); }
const RANKS=[[0,"Recruit","🎖️"],[90,"Private","🪖"],[180,"Corporal","🎗️"],[280,"Sergeant","⭐"],[380,"Captain","🦅"],[480,"General","🌟"]];
function rankFor(g){ let r=RANKS[0]; RANKS.forEach(x=>{ if(g>=x[0]) r=x; }); return r; }
function renderStats(){ const r=rankFor(gold); const el=document.getElementById('stats'); if(el) el.innerHTML=`<span class="pill gold">🪙 ${gold} gold</span><span class="pill">${r[2]} ${r[1]} Vaughn</span>`; }
function toast(msg,isTerr){ const box=document.getElementById('toasts'); if(!box) return; const d=document.createElement('div'); d.className='toast'+(isTerr?' terr':''); d.textContent=msg; box.appendChild(d); setTimeout(()=>d.remove(),2100); }
function addGold(amt,key,label){ if(key){ if(earned[key]) return; earned[key]=true; } const before=captured(); gold+=amt; save(); renderStats(); toast(`+${amt} 🪙 ${label||''}`.trim()); const after=captured(); for(let k=before;k<after;k++){ setTimeout(()=>toast(`🔵 Liberated ${TERRITORIES[k]} for the Union!`,true),500*(k-before+1)); } }
function resetGame(){ if(!confirm("Start a new campaign? This clears your gold, rank, and study progress.")) return; read={}; gold=0; earned={}; save(); renderStats(); home(); }

/* ===================== VIEWS ===================== */
function dayProgress(d){ let done=0; d.topics.forEach((t,ti)=>{ if(read[d.n+'_'+ti]) done++; }); return done; }

function home(){
  renderStats();
  const cap=captured(), N=TERRITORIES.length, goal=PER*N;
  const vpct=Math.round(Math.min(gold,goal)/goal*100);
  let terr=''; TERRITORIES.forEach((t,k)=>{ terr+=`<div class="terr ${k<cap?'won':''}"><span class="tflag">${k<cap?'🔵':'⚪'}</span>${t}</div>`; });
  let html=`<div class="card campaign">
      <h3>🇺🇸 General Vaughn's March to Victory</h3>
      <p class="sub">Study each day &amp; ace the quizzes to earn gold. Every ${PER} gold liberates a Union victory!</p>
      <div class="vbar"><div class="vfill" style="width:${vpct}%"></div><span class="vflag" style="left:${vpct}%">🚩</span></div>
      <div class="vlabel">${cap} of ${N} victories won</div>
      <div class="terrgrid">${terr}</div>
      ${cap>=N?`<div class="victory">🎉 The Union is saved — you won the war, General Vaughn!</div>`:''}
    </div>
    <a class="card" href="study-companion.pdf" target="_blank" style="display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;border:2px solid #2c5282;">
      <div style="font-size:30px;flex-shrink:0">📖</div>
      <div style="flex:1"><h3 style="margin:0;font-size:16px;color:#1e3a5f">Printable Textbook (PDF)</h3>
      <span style="font-size:12px;color:#718096">A 32-page illustrated study guide to read or print. Opens in a new tab.</span></div>
      <div style="color:#cbd5e0;font-size:22px">›</div>
    </a>
    <h3 class="secttitle">📅 Study by Day</h3>`;
  DAYS.forEach(d=>{
    const done=dayProgress(d), tot=d.topics.length, pct=Math.round(done/tot*100);
    html+=`<div class="card daycard" onclick="day(${d.n})">
        <div class="dnum">DAY<br>${d.n}</div>
        <div class="dbody">
          <h3>${d.title}</h3>
          <div class="dmeta">${tot} topics · ${QUESTIONS.filter(q=>q.day===d.n).length}-question quiz</div>
          <div class="bar"><div style="width:${pct}%"></div></div>
        </div>
        <div class="chev">›</div>
      </div>`;
  });
  html+=`<div class="card ultimate">
      <h3>🏆 Ultimate Review</h3>
      <p style="margin:6px 0 0;font-size:14px">All ${QUESTIONS.length} questions from every day, shuffled. Take this when you've studied everything!</p>
      <button class="btn gold block" onclick="startQuiz('ALL')">Start the Ultimate Review →</button>
    </div>
    <span class="resetlink" onclick="resetGame()">↺ Start a new campaign (reset progress)</span>`;
  app.innerHTML=html; window.scrollTo(0,0);
}

function day(n){
  renderStats();
  const d=DAYS.find(x=>x.n===n);
  let html=`<div class="card"><span class="tag">Day ${d.n}</span><h2 style="margin:4px 0 0;color:var(--navy)">${d.title}</h2></div>
    <h3 class="secttitle">Topics — read &amp; check each one</h3>`;
  d.topics.forEach((t,ti)=>{
    const done=read[d.n+'_'+ti];
    html+=`<div class="card topiccard" onclick="topic(${n},${ti})">
        <div class="emoji">${t.emoji}</div>
        <div class="t"><h3>${t.title}</h3><span>Tap to read &amp; check</span></div>
        <div class="check ${done?'':'todo'}">${done?'✓':'○'}</div>
      </div>`;
  });
  html+=`<button class="btn gold block" onclick="startQuiz(${n})">📝 Take the Day ${n} Quiz (${QUESTIONS.filter(q=>q.day===n).length} questions)</button>
    <button class="btn ghost block" onclick="home()">← All days</button>`;
  app.innerHTML=html; window.scrollTo(0,0);
}

function topic(n,ti){
  const d=DAYS.find(x=>x.n===n), t=d.topics[ti];
  let html=`<div class="card summary"><h2>${t.emoji} ${t.title}</h2>${t.summary}</div>
    <p style="text-align:center;color:#718096;font-size:14px;margin:14px 0 0">Read it through — then test yourself on the next page. 👇</p>
    <div class="navrow">
      <button class="btn ghost" onclick="day(${n})">← Day ${n}</button>
      <button class="btn gold" onclick="check(${n},${ti})">✋ Quick Check →</button>
    </div>`;
  app.innerHTML=html; window.scrollTo(0,0);
  addGold(10,'read_'+n+'_'+ti,'Studied a topic!');
  read[n+'_'+ti]=true; save();
}

function check(n,ti){
  const d=DAYS.find(x=>x.n===n), t=d.topics[ti];
  let html=`<div class="card summary"><span class="tag">Quick Check</span><h2 style="margin-top:4px">${t.emoji} ${t.title}</h2>
      <p style="color:#718096;font-size:14px;margin:0">Type your answer from memory, then tap to check.</p></div>`;
  t.flash.forEach((f,j)=>{
    html+=`<div class="flash">
        <div class="qlabel">Flash ${j+1}</div>
        <div class="q">${f.q}</div>
        <input class="flashin" type="text" placeholder="Type your answer…" autocomplete="off">
        <button class="reveal" onclick="revealAns(this)">Show answer</button>
        <div class="ans">✓ ${f.a}</div>
      </div>`;
  });
  html+=`<div class="navrow"><button class="btn ghost" onclick="topic(${n},${ti})">← Re-read</button>`;
  if(ti < d.topics.length-1) html+=`<button class="btn primary" onclick="topic(${n},${ti+1})">Next topic →</button>`;
  else html+=`<button class="btn gold" onclick="day(${n})">Done with Day ${n} ✓</button>`;
  html+=`</div>`;
  app.innerHTML=html; window.scrollTo(0,0);
}
function revealAns(btn){ const c=btn.closest('.flash'); c.querySelector('.flashin').setAttribute('readonly',''); c.querySelector('.ans').classList.add('show'); btn.style.display='none'; }

/* ---------- QUIZ ---------- */
let qi=0, answers=[], QZ=[], quizMode='ALL';
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function buildQuiz(mode){
  const pool = mode==='ALL' ? QUESTIONS.slice() : QUESTIONS.filter(q=>q.day===mode);
  QZ = pool.map(item=>{
    const opts=item.o.map((text,idx)=>({text,correct:idx===item.c}));
    shuffle(opts);
    return { id:item.id, q:item.q, o:opts.map(o=>o.text), c:opts.findIndex(o=>o.correct), e:item.e };
  });
  shuffle(QZ);
}
function startQuiz(mode){ quizMode=mode; qi=0; answers=[]; buildQuiz(mode); question(); }
function quizTitle(){ return quizMode==='ALL' ? 'Ultimate Review' : 'Day '+quizMode+' Quiz'; }
function question(){
  const item=QZ[qi];
  let html=`<div class="card">
    <div class="qcount">${quizTitle()} · Question ${qi+1} of ${QZ.length}</div>
    <div class="bar"><div style="width:${Math.round(qi/QZ.length*100)}%"></div></div>
    <div class="qtext">${item.q}</div>`;
  item.o.forEach((opt,k)=>{ html+=`<button class="opt" onclick="answer(${k})">${opt}</button>`; });
  html+=`<div class="explain"></div>
    <button class="btn primary block hidden" id="nextbtn" onclick="next()">${qi<QZ.length-1?'Next →':'See my score 🎉'}</button>
    <button class="btn ghost block" style="margin-top:14px" onclick="${quizMode==='ALL'?'home()':'day('+quizMode+')'}">Quit quiz</button>
  </div>`;
  app.innerHTML=html; window.scrollTo(0,0);
}
function answer(k){
  const item=QZ[qi];
  if(answers[qi]!==undefined) return;
  answers[qi]=k;
  app.querySelectorAll('.opt').forEach((b,idx)=>{ b.classList.add('disabled'); b.onclick=null; if(idx===item.c) b.classList.add('correct'); if(idx===k&&k!==item.c) b.classList.add('wrong'); });
  const ex=app.querySelector('.explain');
  ex.innerHTML=(k===item.c?'✅ <b>Correct!</b> ':'❌ <b>Not quite.</b> ')+item.e;
  ex.classList.add('show');
  if(k===item.c) addGold(10,'q_'+item.id,'Correct!');
  app.querySelector('#nextbtn').classList.remove('hidden');
}
function next(){ if(qi<QZ.length-1){ qi++; question(); } else results(); }
function results(){
  let score=0; answers.forEach((a,i)=>{ if(a===QZ[i].c) score++; });
  if(quizMode==='ALL' && score===QZ.length) addGold(100,'perfect_all','PERFECT ULTIMATE REVIEW!');
  const pct=Math.round(score/QZ.length*100);
  let msg,color;
  if(pct>=90){msg="Outstanding, General! Test-ready! 🏆";color="var(--green)";}
  else if(pct>=75){msg="Great work — almost there! 💪";color="var(--green)";}
  else if(pct>=60){msg="Good start — review the misses below. 📖";color="var(--gold)";}
  else{msg="Keep drilling — you've got this! 📚";color="var(--red)";}
  let html=`<div class="card scorebox">
      <div class="big" style="color:${color}">${score}/${QZ.length}</div>
      <div class="msg">${msg}</div>
      <button class="btn gold" onclick="startQuiz('${quizMode}')">↻ Retake</button>
      <button class="btn ghost block" onclick="${quizMode==='ALL'?'home()':'day('+quizMode+')'}">${quizMode==='ALL'?'Back to home':'Back to Day '+quizMode}</button>
    </div>
    <div class="card review"><h4>Review your answers</h4>`;
  QZ.forEach((item,i)=>{ const a=answers[i], ok=a===item.c;
    html+=`<div class="ritem ${ok?'ok':'no'}"><span class="icon">${ok?'✅':'❌'}</span>${item.q}<br><b>Answer:</b> ${item.o[item.c]}${!ok?`<br><span style="color:var(--red)">You chose: ${item.o[a]}</span>`:''}<br><span style="color:#4a5568">${item.e}</span></div>`;
  });
  html+=`</div>`;
  app.innerHTML=html; window.scrollTo(0,0);
}

home();
</script>
</body>
</html>
